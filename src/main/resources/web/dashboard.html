<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PlugMod — Dashboard</title>
    <link rel="stylesheet" href="/web/styles.css">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h2>Navigation</h2>
        <button id="navHome">🏠 Home</button>
        <div id="moduleList"></div>
      </aside>

      <main class="content">
        <div class="greeting" id="greeting"></div>

        <section id="homeView">
          <div class="center">
            <div class="title">Upload Modules</div>
            <div class="upload-box">
              <input type="file" multiple id="fileInput"><br>
              <button class="btn blue" id="uploadBtn">Upload</button>
            </div>
          </div>
          <div class="modules" id="modules"></div>
        </section>

        <section id="moduleView" class="hidden">
          <div class="topbar" id="moduleTopbar"></div>
          <div class="module-content" id="moduleContent">
            <iframe id="moduleFrame" title="Module site" src="about:blank" frameborder="0"></iframe>
          </div>
        </section>
      </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Confirmation modal (used by future JS modal replacement) -->
    <div id="confirmModal" class="hidden" role="dialog" aria-modal="true">
      <div class="modal" style="position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--panel);padding:18px;border-radius:8px;min-width:320px;z-index:1200;">
        <div id="confirmMessage" style="margin-bottom:12px;color:var(--muted)"></div>
        <div style="text-align:right">
          <button id="confirmCancel" class="btn gray">Annuleer</button>
          <button id="confirmOk" class="btn red">Verwijder</button>
        </div>
      </div>
    </div>

    <script src="/web/dashboard.js"></script>
  </body>
</html>
